{% load static %}

<html>
    <head>
        <title>Manage Account</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
        <link rel="stylesheet" href="{% static '/bootstrap/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static '/bootstrap/css/custom.css' %}">

        <script src="{% static '/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

        
    </head>
    <body>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h2 class="text-center">Manage Account</h2>
                    <p><strong>Username:</strong> {{ user.username }}</p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'change_password' pk=user.pk %}" class="btn btn-primary">Change Password</a>
                        <a href="{% url 'delete_account' pk=user.pk %}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete your account?')">Delete Account</a>
                        <a href="{% url 'basic_list' pk=user.pk %}" class="btn btn-secondary">Back</a>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
