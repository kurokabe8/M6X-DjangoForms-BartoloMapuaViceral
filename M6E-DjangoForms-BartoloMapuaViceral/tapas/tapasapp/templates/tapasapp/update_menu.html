{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}
<div class="col-md-8">

    <div class="card">
        <div class="card-header">
            <h5 class="card-title"> Type in Dish Details:</h5>
        </div>
        <div class="card-body">

            <form method="POST" action="{% url 'update_dish' user_pk=user.pk pk=d.pk %}">{% csrf_token %}
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <div class="form-group">
                    <label for="name"> Name: </label>
                    <input type="text" class="form-control" id="dname" name="dname" value="{{d.name}}" disabled>
                </div>

                <div class="row">
                    <div class="col-6">
                        <div class="form-group">
                            <label for="vintage"> Cook Time: </label>
                            <input type="number" min="0" step="1" class="form-control w-50" id="ctime" name="ctime" value="{{ cooktime|default:d.cook_time }}">
                        </div>
        
                    </div>
                    <div class="col-6">
                        <div class="form-group">
                            <label for="price"> Prep Time: </label>
                            <input type="number" min="0" step="1" class="form-control w-50" id="ptime" name="ptime" value="{{ preptime|default:d.prep_time }}">
                        </div>
        
                    </div>
                </div>



                <button type="submit" class="mt-3 btn btn-primary">Update dish</button>
            </form>                


        </div>
    </div>

</div>
{% endblock %}
