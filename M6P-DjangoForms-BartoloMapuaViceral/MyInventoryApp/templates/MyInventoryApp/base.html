<!DOCTYPE html>
<html>
<head>
    <title>My Inventory System</title>

    <!-- font link -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Inter', sans-serif;
            background:#f5f7fb;
            color:#333;
        }

        header{
            background:#1f2937;
            color:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        header h1{
            margin:0;
            font-weight:600;
            font-size:22px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-weight:400;
            transition:0.2s;
        }

        nav a:hover{
            color:#60a5fa;
        }

        .container{
            width:85%;
            max-width:1000px;
            margin:40px auto;
            background:white;
            padding:35px;
            border-radius:10px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.05);
        }

        h2{
            margin-top:0;
            font-weight:600;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td{
            padding:12px;
            border-bottom:1px solid #eee;
            text-align:left;
        }

        th{
            background:#f1f5f9;
        }

        tr:hover{
            background:#f9fafb;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:6px;
            cursor:pointer;
            font-family:'Inter', sans-serif;
        }

        button:hover{
            background:#1d4ed8;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ddd;
            border-radius:6px;
            margin-top:5px;
            margin-bottom:15px;
        }

        footer{
            text-align:center;
            padding:20px;
            color:#777;
            font-size:14px;
        }

    </style>

</head>

<body>

<header>
    <h1>My Inventory System</h1>

    <nav>
        <a href="/view_supplier">Suppliers</a>
        <a href="/view_bottles">Water Bottles</a>
        <a href="/add_bottle">Add Bottle</a>
    </nav>
</header>

<div class="container">

{% block content %}
{% endblock %}

</div>

<footer> Inventory System | Group 4 - N1 </footer>

</body>
</html>
