{% extends "MyInventoryApp/base.html" %}

{% block content %}

<h2>Add Water Bottle</h2>

<form method="POST">
    {% csrf_token %}

    {% if errors %}
        <div class="alert alert-danger">
            <ul>
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}

    <label>SKU:</label><br>
    <input type="text" name="sku" value="{{ sku|default_if_none:'' }}"><br><br>

    <label>Brand:</label><br>
    <input type="text" name="brand" value="{{ brand|default_if_none:'' }}"><br><br>

    <label>Cost:</label><br>
    <input type="number" name="cost" step="0.01" value="{{ cost|default_if_none:'' }}"><br><br>

    <label>Size:</label><br>
    <input type="text" name="size" value="{{ size|default_if_none:'' }}"><br><br>

    <label>Mouth Size:</label><br>
    <input type="text" name="mouth_size" value="{{ mouth_size|default_if_none:'' }}"><br><br>

    <label>Color:</label><br>
    <input type="text" name="color" value="{{ color|default_if_none:'' }}"><br><br>

    <label>Supplier:</label><br>
    <select name="supplied_by">
        {% for supplier in suppliers %}
            <option value="{{ supplier.id }}" {% if supplier.id|stringformat:'s' == supplied_by %}selected{% endif %}>
                {{ supplier.name }}
            </option>
        {% endfor %}
    </select><br><br>

    <label>Quantity:</label><br>
    <input type="number" name="current_quantity" value="{{ current_quantity|default_if_none:'' }}"><br><br>

    <button type="submit">Add Bottle</button>
    <button type="submit" name="cancel">Cancel</button>

</form>

{% endblock %}
