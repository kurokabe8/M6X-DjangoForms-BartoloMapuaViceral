{% extends "MyInventoryApp/base.html" %}

{% block content %}

<h2>Change Password</h2>

{% if message %}
    <div style="padding:12px; background:#fee2e2; color:#991b1b; border-radius:8px; margin-bottom:16px;">{{ message }}</div>
{% endif %}

<form method="POST" style="max-width:420px; display:grid; gap:16px;">
    {% csrf_token %}

    <div>
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" required>
    </div>

    <div>
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" required>
    </div>

    <div>
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
    </div>

    <div style="display:grid; gap:12px;">
        <button type="submit" style="padding:10px 16px; border:none; border-radius:8px; background:#2563eb; color:white; cursor:pointer;">Confirm</button>
        <button type="submit" name="cancel" value="1" style="padding:10px 16px; border:none; border-radius:8px; background:#6b7280; color:white; cursor:pointer;" formnovalidate>Cancel</button>
    </div>
</form>

{% endblock %}
